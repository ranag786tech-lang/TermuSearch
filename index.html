<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Ye tag mobile par site ko sahi dikhane ke liye zaroori hai -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiD Search 🔍</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 🎨 Naya Text-Based Logo -->
        <div class="logo">
            <span class="d">D</span><span class="i">i</span><span class="g">i</span><span class="d">D</span>
            <span class="search-text">Search</span>
        </div>

        <!-- 🔍 Search Box Section -->
        <div class="search-section">
            <input type="text" id="searchBox" placeholder="Search anything on DigiD...">
            <br> <!-- Button ko niche lane ke liye -->
            <button onclick="search()">DigiD Search</button>
        </div>

        <!-- 📋 Results Yahan Show Honge -->
        <div id="results"></div>
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
