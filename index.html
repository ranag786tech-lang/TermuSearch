<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiD Search 🔍</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <!-- 🎨 Naya Text-Based Logo -->

        <!-- 🔍 Search Box Section -->

        <!-- 📋 Results Yahan Show Honge -->

</html>
