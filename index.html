<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Ye tag mobile par site ko sahi dikhane ke liye zaroori hai -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiD Search 🔍</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- ✅ PWA ke liye manifest.json add kiya (mobile install hone ke liye) -->
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="container">
    <!-- 🎨 Naya Text-Based Logo -->
<div class="logo">
    <span style="color: #4285F4;">D</span><span style="color: #EA4335;">i</span><span style="color: #FBBC05;">g</span><span style="color: #34A853;">i</span><span style="color: #4285F4;">D</span>
    <span class="search-text">Search</span>
</div>
        <!-- 🔍 Search Box Section -->
    <div class="search-tabs">
    <div class="tab active" onclick="setTab(this, 'All')">🔍 All</div>
    <div class="tab" onclick="setTab(this, 'Images')">🖼️ Images</div>
    <div class="tab" onclick="setTab(this, 'Videos')">🎥 Videos</div>
    <div class="tab" onclick="setTab(this, 'News')">📰 News</div>
    <div class="tab" onclick="setTab(this, 'Books')">📚 Books</div>
    <div class="tab" onclick="setTab(this, 'Finance')">💹 Finance</div>
    </div>
    
        <div class="search-section">
            <input type="text" id="searchBox" placeholder="Search anything on DigiD...">
            <br> <!-- Button ko niche lane ke liye -->
            <button onclick="search()">DigiD Search</button>
        </div>

        <!-- 📋 Results Yahan Show Honge -->
        <div id="results"></div>
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="script.js"></script>
    
    <!-- ✅ Service Worker register karne ke liye (PWA ke liye) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
            .then(() => console.log('✅ Service Worker registered!'))
            .catch(err => console.log('❌ Service Worker failed:', err));
        }
    </script>
</body>
</html>
