name: DigiD Crawler

# When to run automatically
on:
  schedule:
    - cron: '0 */12 * * *'     # Har 12 ghante mein (12 AM and 12 PM)
  workflow_dispatch:            # Manual run ke liye button

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Get your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Install Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # Step 3: Install required packages
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pymongo
      
      # Step 4: Run the crawler with MongoDB URI from secrets
      - name: Run crawler
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python crawler.py